<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" width="380" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;family=Cormorant+Garamond:wght@300&amp;family=Tenor+Sans&amp;display=swap');
      .mono { font-family: 'Cinzel', 'Palatino Linotype', serif; font-size: 26px; font-weight: 600; fill: #C9A96E; }
      .name { font-family: 'Cormorant Garamond', 'Palatino Linotype', serif; font-size: 30px; font-weight: 300; letter-spacing: 8px; fill: #F5EFE4; }
      .tag  { font-family: 'Tenor Sans', 'Arial', sans-serif; font-size: 7px; letter-spacing: 5px; fill: rgba(201,169,110,0.65); }
    </style>
  </defs>

  <!-- Emblem carré -->
  <!-- Carré extérieur -->
  <rect x="10" y="10" width="70" height="70" fill="none" stroke="#C9A96E" stroke-width="1.5"/>
  <!-- Carré intérieur -->
  <rect x="17" y="17" width="56" height="56" fill="none" stroke="#C9A96E" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- Coins décoratifs TL -->
  <polyline points="10,18 10,10 18,10" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Coins décoratifs TR -->
  <polyline points="72,10 80,10 80,18" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Coins décoratifs BL -->
  <polyline points="10,72 10,80 18,80" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Coins décoratifs BR -->
  <polyline points="72,80 80,80 80,72" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Monogramme LS -->
  <text x="45" y="57" text-anchor="middle" class="mono">LS</text>

  <!-- Ligne verticale séparatrice -->
  <line x1="96" y1="22" x2="96" y2="68" stroke="#C9A96E" stroke-width="0.7" stroke-opacity="0.25"/>

  <!-- Nom du restaurant -->
  <text x="112" y="46" class="name">LES SENS</text>

  <!-- Ligne décorative sous le nom -->
  <line x1="112" y1="54" x2="340" y2="54" stroke="#C9A96E" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- Tagline -->
  <text x="112" y="66" class="tag">RESTAURANT · NICE</text>
</svg>
